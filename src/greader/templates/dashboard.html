{% extends "base.html" %}

{% block title %}GReader – Dashboard{% endblock %}

{% block content %}
<div class="mb-8">
    <h1 class="text-2xl font-semibold tracking-tight text-gray-900">Dashboard</h1>
    <p class="mt-1 text-sm text-gray-500">AI-assisted assignment authoring</p>
</div>

<div class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
    <div class="rounded-xl border border-gray-200 bg-white p-6">
        <p class="text-xs font-medium uppercase tracking-wider text-gray-400">Assignments</p>
        <p class="mt-2 text-3xl font-semibold text-gray-900">0</p>
    </div>
    <div class="rounded-xl border border-gray-200 bg-white p-6">
        <p class="text-xs font-medium uppercase tracking-wider text-gray-400">Pending Review</p>
        <p class="mt-2 text-3xl font-semibold text-gray-900">0</p>
    </div>
    <div class="rounded-xl border border-gray-200 bg-white p-6">
        <p class="text-xs font-medium uppercase tracking-wider text-gray-400">Test Cases</p>
        <p class="mt-2 text-3xl font-semibold text-gray-900">0</p>
    </div>
</div>

<div class="mt-8 rounded-xl border border-gray-200 bg-white p-6">
    <h2 class="text-base font-semibold text-gray-900">Recent Activity</h2>
    <p class="mt-3 text-sm text-gray-500">No recent activity. Create your first assignment to get started.</p>
</div>
{% endblock %}
